name: CI

# Зелёные гейты PR (постулат 30: авто-мерж на зелёных): lint, typecheck, сборка
# против эфемерной БД — та же схема, что у прод-сборки, но без standalone/деплоя.

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: kazanskaya_build
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Enable corepack + pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.15.0 --activate

      - name: Install deps
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Generate importmap + types
        working-directory: web
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/kazanskaya_build
          PAYLOAD_SECRET: ci-build-only-secret-not-used-at-runtime
        run: |
          pnpm generate:importmap
          pnpm generate:types

      - name: Lint
        working-directory: web
        run: pnpm lint

      - name: Typecheck
        working-directory: web
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/kazanskaya_build
          PAYLOAD_SECRET: ci-build-only-secret-not-used-at-runtime
        run: pnpm typecheck

      - name: Build
        working-directory: web
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/kazanskaya_build
          PAYLOAD_SECRET: ci-build-only-secret-not-used-at-runtime
          NEXT_PUBLIC_SERVER_URL: http://127.0.0.1:3001
        run: pnpm build
