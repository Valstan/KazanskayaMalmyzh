name: Deploy to production

# Сборка едет в CI (ubuntu): прод-VPS (Бокс Sabantuy, 1.5 GiB без swap, второй жилец)
# не тянет next build (G20). На сервер по SSH кладём standalone-артефакт и рестартим
# systemd-сервис kazanskaya. Харвест deploy-prod.yml Сабантуя (ADR-0007).
#
# Требуется:
#   secrets.SSH_PRIVATE_KEY        — приватная часть ИЗОЛИРОВАННОГО ключа id_ed25519_kazanskaya (#001, НЕ сабантуевский)
#   vars.DEPLOY_SSH_HOST           — <hex>.vps.myjino.ru (myjino ротирует — потому в vars)
#   vars.DEPLOY_SSH_PORT           — внешний порт (G8: внешний ≠ внутренний 22)
#   vars.NEXT_PUBLIC_SERVER_URL    — боевой домен, строго punycode (G133/G134):
#                                    https://xn--80aaa0andu6a3j.xn--80adkdyec4j.xn--p1ai

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'mailbox/**'
      - '**.md'
      - '.github/**'
      - '.claude/**'
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: kazanskaya_build
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2

      # Предохранитель миграций (#017): Payload-миграции применяет разработчик
      # вручную на проде ДО деплоя; CI лишь проверяет, что в коммите нет
      # неприменённых. workflow_dispatch = «уже применил» → guard пропускается.
      - name: Migration guard
        if: github.event_name != 'workflow_dispatch'
        run: |
          set -e
          NEW=$(git diff --name-only --diff-filter=A HEAD~1 HEAD -- 'web/src/migrations/*.ts' | grep -v '/index\.ts$' || true)
          if [ -n "$NEW" ]; then
            echo "::error::Коммит вносит новые Payload-миграции. Примени их на проде вручную, затем запусти деплой через workflow_dispatch."
            echo "$NEW"
            exit 1
          fi
          echo "Новых Payload-миграций в коммите нет — деплой продолжается."

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Enable corepack + pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.15.0 --activate

      - name: Install deps
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Generate importmap + types
        working-directory: web
        run: |
          pnpm generate:importmap
          pnpm generate:types

      - name: Build (standalone)
        working-directory: web
        env:
          # Эфемерная БД CI: push:true создаёт схему здесь, prerender отдаёт
          # статические страницы — рантайм наполнит через ISR/ревалидацию.
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/kazanskaya_build
          PAYLOAD_SECRET: ci-build-only-secret-not-used-at-runtime
          NEXT_PUBLIC_SERVER_URL: ${{ vars.NEXT_PUBLIC_SERVER_URL || 'http://127.0.0.1:3001' }}
          # Метрика инлайнится в пререндер на этапе build (id не секрет — виден в HTML).
          NEXT_PUBLIC_YM_ID: ${{ vars.NEXT_PUBLIC_YM_ID }}
          STANDALONE_BUILD: '1'
        run: pnpm build

      - name: Assemble standalone bundle
        working-directory: web
        run: |
          set -e
          if [ ! -f .next/standalone/server.js ]; then
            echo "::error::server.js не в корне .next/standalone — проверь outputFileTracingRoot"
            find .next/standalone -maxdepth 3 -name server.js || true
            exit 1
          fi
          cp -r .next/static .next/standalone/.next/static
          if [ -d public ]; then cp -r public .next/standalone/public; fi
          tar czf ../kazanskaya-app.tgz -C .next/standalone .
          echo "bundle: $(du -h ../kazanskaya-app.tgz | cut -f1)"

      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          DEPLOY_SSH_HOST: ${{ vars.DEPLOY_SSH_HOST }}
          DEPLOY_SSH_PORT: ${{ vars.DEPLOY_SSH_PORT }}
        run: |
          set -e
          if [ -z "$SSH_PRIVATE_KEY" ] || [ -z "$DEPLOY_SSH_HOST" ] || [ -z "$DEPLOY_SSH_PORT" ]; then
            echo "::error::Заданы не все: secrets.SSH_PRIVATE_KEY / vars.DEPLOY_SSH_HOST / vars.DEPLOY_SSH_PORT"
            exit 1
          fi
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519_kazanskaya
          chmod 600 ~/.ssh/id_ed25519_kazanskaya
          ssh-keyscan -p "$DEPLOY_SSH_PORT" -H "$DEPLOY_SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          cat > ~/.ssh/config <<CFG
          Host kazanskaya
            HostName $DEPLOY_SSH_HOST
            Port $DEPLOY_SSH_PORT
            User valstan
            IdentityFile ~/.ssh/id_ed25519_kazanskaya
            IdentitiesOnly yes
            StrictHostKeyChecking accept-new
            ServerAliveInterval 30
          CFG
          chmod 600 ~/.ssh/config

      - name: Ship artifact + restart
        run: |
          set -e
          scp -q kazanskaya-app.tgz kazanskaya:/tmp/kazanskaya-app.tgz
          ssh kazanskaya 'bash -s' "${{ github.sha }}" <<'REMOTE'
          set -e
          SHA="$1"
          BASE=/home/valstan/kazanskaya
          REL="$BASE/releases/$SHA"
          rm -rf "$REL"; mkdir -p "$REL"
          tar xzf /tmp/kazanskaya-app.tgz -C "$REL"
          rm -f /tmp/kazanskaya-app.tgz
          # Персистентное медиа (G146): public/media в релизе → симлинк на shared/media,
          # переживающий деплои.
          # public/ может отсутствовать в артефакте (пока в репо нет web/public) — создаём.
          mkdir -p "$BASE/shared/media" "$REL/public"
          rm -rf "$REL/public/media"
          ln -sfn "$BASE/shared/media" "$REL/public/media"
          ln -sfn "$REL" "$BASE/current"
          sudo systemctl restart kazanskaya
          # держим последние 5 релизов
          ls -1dt "$BASE"/releases/*/ 2>/dev/null | tail -n +6 | xargs -r rm -rf
          echo "deployed $SHA"
          REMOTE

      # #011 content-smoke: не только 200, но и контент-маркер главной.
      - name: Smoke check — local routes (/, /admin) + content marker
        run: |
          set -e
          ssh kazanskaya 'bash -s' <<'REMOTE'
          set -e
          sleep 6   # дать сервису подняться после systemctl restart
          fail=0
          check() {
            path="$1"; expected="$2"
            status=$(curl -s -o /dev/null -w '%{http_code}' --max-time 15 "http://127.0.0.1:3001$path" || true)
            echo "local $path → $status (ожидалось: $expected)"
            case " $expected " in
              *" $status "*) ;;
              *) echo "::error::local $path = $status, ожидалось одно из: $expected"; fail=1 ;;
            esac
          }
          check "/"      "200"
          check "/admin" "200 302 307 308"
          # Контент-маркер (#011): главная должна содержать название праздника.
          if curl -s --max-time 15 "http://127.0.0.1:3001/" | grep -q "Ярмарка Казанская"; then
            echo "content marker OK: «Ярмарка Казанская» на главной"
          else
            echo "::error::контент-маркер «Ярмарка Казанская» не найден на главной"
            fail=1
          fi
          exit $fail
          REMOTE

      - name: On failure — журналы прода
        if: failure()
        run: |
          ssh kazanskaya "sudo systemctl status kazanskaya --no-pager -l" 2>&1 || true
          ssh kazanskaya "sudo journalctl -u kazanskaya -n 80 --no-pager" 2>&1 || true
